<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> File sharing </title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
</head>
<body>
    <section class="upload-container">
        <div class="drop-zone">
            <div class="icon-container">
                <img src="./drop_file1.svg" alt="file.icon" class= "center" draggable="false">
                <img src="./drop_file1.svg" alt="file.icon" class= "left" draggable="false">
                <img src="./drop_file1.svg" alt="file.icon" class= "right" draggable="false">
            </div>
            <input type="file" id="fileInput">
            <div class="title">Drop your Files here or, <span class="browseBtn"> browse</span></div>
        </div>
        <div class="progress-container">
            <div class="bg-progress"></div>
            <div class="inner-container">
                <div class="title">uploading...</div>
                <div class="percent-container"><span id="percent">0</span>%</div>
                <div class="progress-bar"></div>
            </div>
            </div>
        <div class="sharing-container">
            <p class="expire">Link expires in 24 hrs </p>
            <div class="input-container">
                <input type="text" id="fileURL"  readonly value="helafe rgkajoaniona[oinvge[ongvo[aenigv[pangv[kodanvokndasfoknlgvsdkgjpiaSJF]Po">
                <i class="fa-regular fa-copy" onclick="copyText()"></i>
            </div>
            <p>Or Send Via Email</p>
            <div class="email-container">
                <form id="emailForm">
                    <div class="field">
                        <label for="sender">Your email</label>
                        <input type="email" required name="from-email" id="sender">
                    </div>
                    <div class="field">
                        <label for="receiver">Receiver's email</label>
                        <input type="email" required name="to-email" id="receiver">
                    </div>
                    <button type="submit" id="sendBtn">Send</button>
                </form>
            </div>
        </div>
    </section>
    <div class="bg-photo"></div>
    <div class="toast">copied to clipboard</div>
    <script src="script.js"></script>
</body>
</html>
